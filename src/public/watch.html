<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playdarr</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="watch-page">
  <div class="watch-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="/" class="sidebar-back">← Lobby</a>
        <button id="sidebar-toggle" class="sidebar-collapse-btn" title="Collapse sidebar">‹</button>
      </div>
      <div class="sidebar-room-name" id="room-name"></div>
      <h3 id="movie-title" class="sidebar-title">No movie selected</h3>
      <button id="choose-movie-btn" class="btn-choose-movie" style="display:none">🎬 Choose Movie</button>

      <!-- Host: set YouTube video (YouTube rooms only) -->
      <div id="yt-controls-section" style="display:none">
        <h4 class="section-heading">YouTube Video</h4>
        <div class="sidebar-input-row">
          <input type="text" id="yt-url-input" class="sidebar-text-input" placeholder="YouTube URL…">
          <button id="yt-url-btn" class="btn-sidebar-action">Set</button>
        </div>
        <div id="yt-url-error" style="color:#ff6b7a;font-size:0.78rem;margin-top:0.3rem;display:none"></div>
      </div>

      <!-- Countdown (host only) -->
      <div id="countdown-section" style="display:none">
        <h4 class="section-heading">⏱ Countdown</h4>
        <div class="countdown-presets">
          <button class="btn-countdown-preset" data-secs="3">3s</button>
          <button class="btn-countdown-preset" data-secs="5">5s</button>
          <button class="btn-countdown-preset" data-secs="10">10s</button>
          <input type="number" id="countdown-custom" class="countdown-custom-input" min="1" max="99" placeholder="#">
          <button id="countdown-custom-btn" class="btn-countdown-preset btn-countdown-go">▶</button>
        </div>
      </div>
      <button id="cancel-countdown-btn" class="btn-cancel-countdown" style="display:none">✕ Cancel countdown</button>

      <!-- Intermission (host only) -->
      <div id="intermission-section" style="display:none">
        <h4 class="section-heading">☕ Intermission</h4>
        <div class="sidebar-input-row">
          <input type="number" id="intermission-minutes" class="sidebar-text-input" min="1" max="120" placeholder="Minutes" value="10">
          <button id="start-intermission-btn" class="btn-sidebar-action">Start</button>
        </div>
      </div>
      <button id="cancel-intermission-btn" class="btn-cancel-intermission" style="display:none">✕ End Intermission</button>

      <!-- Room controls (host only) -->
      <div id="room-controls-section" style="display:none">
        <h4 class="section-heading">Room Controls</h4>
        <div class="room-control-row">
          <span>Lock playback</span>
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-lock-playback">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="room-control-row">
          <span>Reactions</span>
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-reactions" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- Invite link (host only) -->
      <div id="invite-section" style="display:none">
        <h4 class="section-heading">Invite Link</h4>
        <button id="copy-invite-btn" class="btn-copy btn-copy-invite">Copy Invite Link</button>
      </div>

      <div class="viewers-section">
        <h4 class="section-heading">Watching</h4>
        <div id="viewers-list" class="viewers-list"></div>
      </div>

      <div class="chat-section">
        <div class="chat-heading-row">
          <h4 class="section-heading">Chat</h4>
          <button id="chat-export" class="btn-chat-export" title="Export chat as .txt">&#x21E9;</button>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" class="chat-input" placeholder="Message…" maxlength="300" autocomplete="off">
          <button id="chat-send" class="btn-chat-send">↵</button>
        </div>
      </div>

      <div class="sync-status">
        <div id="sync-dot" class="sync-dot synced"></div>
        <span id="sync-text">Synced</span>
      </div>
    </aside>

    <div class="player-container">
      <!-- Expand tab + unread badge (visible when sidebar is collapsed) -->
      <div id="sidebar-expand-tab" class="sidebar-expand-tab" style="display:none">
        <button id="sidebar-expand-btn" class="sidebar-expand-btn" title="Show sidebar">›</button>
        <span id="chat-badge" class="notif-badge" style="display:none"></span>
      </div>

      <!-- Toast notification area -->
      <div id="notif-area" class="notif-area"></div>

      <div id="no-movie" class="no-movie-message">
        <div class="no-movie-icon">🎬</div>
        <p id="no-movie-text">Waiting for host to choose a movie…</p>
      </div>
      <div id="yt-player-container" style="display:none">
        <div id="yt-player"></div>
      </div>
      <video id="video-player" controls preload="metadata" style="display:none">
        Your browser does not support the video element.
      </video>
      <!-- Intermission overlay -->
      <div id="intermission-overlay" class="intermission-overlay" style="display:none">
        <div class="intermission-card">
          <img id="intermission-poster" class="intermission-poster" alt="" style="display:none">
          <div class="intermission-poster-placeholder" id="intermission-poster-placeholder">🎬</div>
          <div class="intermission-info">
            <div class="intermission-label">☕ Intermission</div>
            <div class="intermission-movie-title" id="intermission-movie-title"></div>
            <div class="intermission-timer" id="intermission-timer">--:--</div>
            <div class="intermission-sub">Movie resumes when the timer ends</div>
          </div>
        </div>
      </div>

      <!-- Countdown overlay -->
      <div id="countdown-overlay" class="countdown-overlay" style="display:none">
        <canvas id="countdown-canvas" class="countdown-canvas" width="500" height="500"></canvas>
      </div>

      <!-- Reaction bar -->
      <div class="reaction-bar" id="reaction-bar">
        <button class="reaction-btn" data-emoji="👍">👍</button>
        <button class="reaction-btn" data-emoji="❤️">❤️</button>
        <button class="reaction-btn" data-emoji="😂">😂</button>
        <button class="reaction-btn" data-emoji="😱">😱</button>
        <button class="reaction-btn" data-emoji="😮">😮</button>
        <button class="reaction-btn" data-emoji="👏">👏</button>
      </div>

      <!-- Shown when browser blocks autoplay -->
      <div id="play-overlay" class="play-overlay" style="display:none">
        <button id="play-overlay-btn" class="play-overlay-btn">▶</button>
        <p>Click to start playback</p>
      </div>
    </div>
  </div>

  <!-- Movie browser modal (host only) -->
  <div id="movie-modal" class="modal-overlay" style="display:none">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h3>Choose a Movie</h3>
        <button id="close-movie-modal" class="modal-close">✕</button>
      </div>
      <div class="browser-toolbar" style="margin-bottom:1rem;flex-shrink:0">
        <div class="toolbar-filters">
          <input type="text" id="search-input" class="search-input" placeholder="Search…" autocomplete="off">
          <select id="genre-select" class="filter-select"><option value="">All genres</option></select>
          <select id="sort-select" class="filter-select">
            <option value="title">Title</option>
            <option value="year">Newest</option>
            <option value="rating">Rating</option>
          </select>
        </div>
        <span id="movie-count" class="movie-count"></span>
      </div>
      <div id="movies-grid" class="movies-grid modal-grid"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js" integrity="sha384-1B+J55elPxu+trIhW7QThjZg3evX8C5P6zjB82Xnn46RKPAXpL+vkanRSjCidsJv" crossorigin="anonymous"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/player.js"></script>
</body>
</html>
