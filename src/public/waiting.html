<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Opening Soon — Playdarr</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .waiting-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .waiting-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      text-align: center;
      width: 100%;
      max-width: 460px;
    }
    .waiting-icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .waiting-card h1 { font-size: 1.5rem; color: var(--accent); margin-bottom: 0.4rem; }
    .waiting-room-name { font-size: 1.15rem; font-weight: 600; color: var(--text); margin-bottom: 1.75rem; }
    .waiting-time-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 2rem;
    }
    .waiting-time-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .waiting-time-value { font-size: 1.05rem; font-weight: 600; color: var(--text); }
    .waiting-redirect-note { font-size: 0.82rem; color: var(--text-muted); }
    .waiting-spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid rgba(255,194,48,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-right: 0.4rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="waiting-page">
  <div class="waiting-card">
    <div class="waiting-icon">🎬</div>
    <h1>Room Opening Soon</h1>
    <div class="waiting-room-name" id="room-name"></div>
    <div class="waiting-time-block">
      <div class="waiting-time-label">Scheduled for</div>
      <div class="waiting-time-value" id="opens-time"></div>
    </div>
    <div class="waiting-redirect-note">
      <span class="waiting-spinner"></span>
      You'll be redirected automatically when the room opens
    </div>
  </div>

  <script src="/js/waiting.js"></script>
</body>
</html>
