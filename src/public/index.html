<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playdarr</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="browser-page">
  <header class="header">
    <div class="header-logo">Playdarr</div>
    <div class="header-right">
      <div class="user-menu">
        <img id="user-avatar" class="user-avatar" src="" alt="" style="display:none">
        <span id="user-name" class="user-name"></span>
        <button id="edit-name-btn" class="btn-edit-name" title="Change display name" style="display:none">✎</button>
        <form action="/auth/logout" method="POST" style="display:inline">
          <button type="submit" class="btn-logout">Sign out</button>
        </form>
      </div>

      <!-- Display name editor (hidden by default) -->
      <div id="name-editor" class="name-editor" style="display:none">
        <input id="name-input" class="name-editor-input" type="text" maxlength="40" placeholder="Display name">
        <button id="name-save-btn" class="btn-create" style="padding:0.25rem 0.75rem;font-size:0.85rem">Save</button>
        <button id="name-cancel-btn" class="btn-logout">Cancel</button>
      </div>
    </div>
  </header>

  <main class="browser-main">
    <div class="browser-toolbar">
      <h2>Rooms</h2>
      <div style="display:flex;gap:0.5rem;align-items:center">
        <button id="schedule-room-btn" class="btn-schedule" style="display:none">&#128197; Schedule</button>
        <button id="create-room-btn" class="btn-create" style="display:none">+ Create Room</button>
      </div>
    </div>
    <div id="rooms-grid" class="rooms-grid">
      <div class="loading">Looking for rooms…</div>
    </div>

    <div id="scheduled-section" style="display:none">
      <div class="browser-toolbar" style="margin-top:2rem">
        <h2>Scheduled</h2>
      </div>
      <div id="scheduled-grid" class="rooms-grid"></div>
    </div>
  </main>

  <!-- Create room modal -->
  <div id="create-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <h3>Create a Room</h3>
      <div class="room-type-selector">
        <button class="btn-room-type active" data-type="movie">🎬 Movie</button>
        <button class="btn-room-type" data-type="youtube">▶ YouTube</button>
      </div>
      <input type="text" id="room-name-input" class="search-input" placeholder="Room name (optional)" maxlength="60" style="width:100%">
      <div id="yt-url-row" style="display:none;margin-top:0.75rem">
        <input type="text" id="yt-url-create" class="search-input" placeholder="YouTube URL…" style="width:100%">
        <div id="yt-url-create-error" style="color:#ff6b7a;font-size:0.8rem;margin-top:0.3rem;display:none"></div>
      </div>
      <div class="modal-actions">
        <button id="cancel-create" class="btn-logout">Cancel</button>
        <button id="confirm-create" class="btn-create">Create</button>
      </div>
    </div>
  </div>

  <!-- Schedule room modal -->
  <div id="schedule-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <h3>Schedule a Room</h3>
      <input type="text" id="sched-name" class="search-input" placeholder="Room name" maxlength="60" style="width:100%;margin-bottom:0.75rem">
      <div class="sched-field-group">
        <label class="sched-label">Date &amp; Time</label>
        <input type="datetime-local" id="sched-datetime" class="search-input" style="width:100%">
      </div>
      <div class="sched-field-group">
        <label class="sched-label">Timezone</label>
        <select id="sched-timezone" class="filter-select" style="width:100%"></select>
      </div>
      <div id="sched-error" style="color:#ff6b7a;font-size:0.8rem;margin-top:0.5rem;display:none"></div>
      <div class="modal-actions">
        <button id="sched-cancel" class="btn-logout">Cancel</button>
        <button id="sched-confirm" class="btn-create">Schedule</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/lobby.js"></script>
</body>
</html>
