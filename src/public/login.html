<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playdarr — Login</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">🎬</div>
      <h1>Playdarr</h1>
      <p>Watch movies together, in sync.</p>

      <div id="error-msg" class="error-msg" style="display:none"></div>

      <a href="/auth/plex" class="btn-plex">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M11.994 0C5.368 0 0 5.368 0 11.994S5.368 24 11.994 24 24 18.626 24 11.994 18.626 0 11.994 0zm.614 16.865H9.01L9 7.135h3.608l4.382 5.028-4.382 4.702z"/>
        </svg>
        Sign in with Plex
      </a>

      <p class="login-note">Have an invite link? Use it to join as a guest — no Plex account needed.</p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const messages = {
      plex: 'Could not connect to Plex. Please try again.',
      no_token: 'Authorization was not completed. Please try again.',
      access: "You don't have access to this Plex server.",
      auth: 'Authentication failed. Please try again.'
    };
    const error = params.get('error');
    if (error && messages[error]) {
      const el = document.getElementById('error-msg');
      el.textContent = messages[error];
      el.style.display = 'block';
    }
  </script>
</body>
</html>
