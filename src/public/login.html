<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playdarr — Login</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">🎬</div>
      <h1>Playdarr</h1>
      <p>Watch movies together, in sync.</p>

      <div id="error-msg" class="error-msg" style="display:none"></div>

      <a href="/auth/plex" class="btn-plex">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M11.994 0C5.368 0 0 5.368 0 11.994S5.368 24 11.994 24 24 18.626 24 11.994 18.626 0 11.994 0zm.614 16.865H9.01L9 7.135h3.608l4.382 5.028-4.382 4.702z"/>
        </svg>
        Sign in with Plex
      </a>

      <p class="login-note">Have an invite link? Use it to join as a guest — no Plex account needed.</p>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
