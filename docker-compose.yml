version: '3.8'

services:
  movienight:
    build: .
    container_name: movienight
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - sessions:/data
      - livetv-hls:/livetv/hls:ro  # read HLS segments written by livetv-streamer
    # Allows the container to reach your Plex server on the host machine.
    # On Windows/Mac Docker this is automatic; on Linux this adds the mapping.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  livetv-streamer:
    build: ./livetv
    container_name: livetv-streamer
    profiles: [livetv]
    volumes:
      - livetv-hls:/hls
      - livetv-config:/config
    environment:
      - HDHR_IP=${HDHR_IP}
      - HDHR_PORT=${HDHR_PORT:-5004}
      - DEFAULT_CHANNEL=${LIVETV_DEFAULT_CHANNEL:-7.1}
      - PLEX_HOST=${LIVETV_PLEX_HOST}
    restart: unless-stopped

volumes:
  sessions:
    driver: local
  livetv-hls:
  livetv-config:
