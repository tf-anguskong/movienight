services:
  movienight:
    build: .
    container_name: movienight
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - sessions:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    devices:
      - /dev/dri:/dev/dri

volumes:
  sessions:
    driver: local
